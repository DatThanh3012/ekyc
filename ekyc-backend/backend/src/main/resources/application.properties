spring.application.name=backend

# Ket noi MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ekyc_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate tu tao/cap nhat bang dua theo Entity - QUAN TRONG nhat cho task nay
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Config
jwt.secret=ekyc-secret-key-doi-thanh-chuoi-that-dai-va-ngau-nhien-khi-len-production-2026
jwt.expiration-ms=86400000

# AI Service
ai.service.base-url=http://localhost:8000

# Thu muc luu anh CCCD/selfie tren server
file.upload-dir=uploads

# Tang gioi han upload file (mac dinh Spring Boot chi cho 1MB, anh chup se lon hon)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.port=8080